<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto — Mundo Delis</title>
<link rel="icon" href="img/logo.avif" type="image/avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<div class="page detail-page">
  <div class="top-bar">
    <a id="back-link" href="menu.html" class="back-btn" aria-label="Volver"><i class="ti ti-arrow-left"></i></a>
    <span class="top-title" id="top-title"></span>
    <div class="top-logo">
      <img src="img/logo.avif" alt="Logo" class="top-logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <i class="ti ti-rosette" style="display:none"></i>
    </div>
  </div>

  <div id="detail-content">
    <!-- Skeleton hero -->
    <div id="skeleton-hero" style="
      width:100%; aspect-ratio:4/3; background:linear-gradient(90deg,#f0e8ea 25%,#fdf5f7 50%,#f0e8ea 75%);
      background-size:200% 100%; animation:shimmer 1.4s infinite;">
    </div>
    <div style="padding:20px">
      <div style="height:24px;width:60%;border-radius:8px;background:#f0e8ea;margin-bottom:12px;
        background:linear-gradient(90deg,#f0e8ea 25%,#fdf5f7 50%,#f0e8ea 75%);
        background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
      <div style="height:16px;width:90%;border-radius:8px;background:#f0e8ea;margin-bottom:8px;
        background:linear-gradient(90deg,#f0e8ea 25%,#fdf5f7 50%,#f0e8ea 75%);
        background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
    </div>
  </div>
</div>

<style>
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>

<script>
// ── CONFIG SUPABASE ────────────────────────────────────────────



async function sbGet(path) {
  const r = await fetch(`${window.SUPABASE_URL}/rest/v1${path}`, {
    headers: {
      'apikey': window.SUPABASE_ANON,
      'Authorization': `Bearer ${window.SUPABASE_ANON}`,
    }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function fmt(n) { return '$' + parseInt(n).toLocaleString('es-CO'); }

function esNuevo(prod, newDays) {
  if (!prod.created_at) return false;
  return (Date.now() - new Date(prod.created_at).getTime()) < parseInt(newDays) * 86400000;
}

function badgeHtml(prod, newDays) {
  if (prod.badge === 'rec') return '<span class="badge-rec">⭐ Recomendado</span>';
  if (prod.badge === 'new' || (prod.badge_new_auto && esNuevo(prod, newDays))) {
    return '<span class="badge-new">Nuevo</span>';
  }
  return '';
}

async function init() {
  const params = new URLSearchParams(location.search);
  const prodId = params.get('id');

  if (!prodId) {
    showError('Producto no especificado');
    return;
  }

  try {
    // El producto visible=true ya está filtrado por RLS — si no existe, no se devuelve
    const [prods, ajustes] = await Promise.all([
      sbGet(`/productos?id=eq.${prodId}&visible=eq.true&select=*`),
      sbGet(`/ajustes?clave=eq.new_days&select=valor`),
    ]);

    const prod    = prods[0];
    const newDays = ajustes[0]?.valor || '14';

    if (!prod) { showError('Producto no encontrado'); return; }

    // Trae la categoría para el ícono y el back-link
    const cats = await sbGet(`/categorias?id=eq.${prod.categoria_id}&select=*`);
    const cat  = cats[0];

    document.title = `${prod.nombre} — Mundo Delis`;
    document.getElementById('top-title').textContent = cat?.nombre || '';
    document.getElementById('back-link').href =
      `productos.html?cat=${prod.categoria_id}`;

    const catIcon = cat?.icono || 'ti-rosette';
    const badge   = badgeHtml(prod, newDays);

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-hero">
        <img src="${prod.imagen_url}" alt="${prod.nombre}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <i class="ti ${catIcon}" aria-hidden="true" style="display:none"></i>
      </div>
      <div class="detail-body">
        <div class="detail-name">${prod.nombre}</div>
        ${badge ? `<div class="detail-badges">${badge}</div>` : ''}
        <p class="detail-desc">${prod.desc_larga || prod.desc_corta}</p>
        <div class="detail-price-row">
          <span class="detail-price-label">Precio</span>
          <span class="detail-price">${fmt(prod.precio)}</span>
        </div>
        <div class="detail-note">
          <i class="ti ti-info-circle" aria-hidden="true"></i>
          <span>¿Te antojaste? Puedes pedirlo a domicilio desde la sección <strong>Domicilios</strong> o acercarte a nuestro local.</span>
        </div>
        <a href="domicilios.html" class="home-btn home-btn-gold" style="margin-top:16px;display:flex;">
          <i class="ti ti-motorbike" aria-hidden="true"></i> Pedir a domicilio
        </a>
      </div>
      <div class="pb"></div>`;

  } catch (e) {
    showError('No se pudo cargar el producto');
    console.error(e);
  }
}

function showError(msg) {
  document.getElementById('detail-content').innerHTML = `
    <div class="empty-state">
      <i class="ti ti-alert-circle"></i>
      <h3>${msg}</h3>
      <p><a href="menu.html" style="color:#A87C3A">← Volver al menú</a></p>
    </div>`;
}

init();
</script>
</body>
</html>
