<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos — Mundo Delis</title>
<link rel="icon" href="img/logo.avif" type="image/avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<div class="page prod-list-page">
  <div class="top-bar">
    <a href="menu.html" class="back-btn" aria-label="Volver"><i class="ti ti-arrow-left"></i></a>
    <span class="top-title" id="top-title">Cargando…</span>
    <div class="top-logo">
      <img src="img/logo.avif" alt="Logo" class="top-logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <i class="ti ti-rosette" style="display:none"></i>
    </div>
  </div>

  <div id="cat-header-wrap"></div>
  <div id="prod-list"><div class="prod-skeleton-wrap" id="skeletons"></div></div>
  <div class="pb"></div>
</div>

<style>
.prod-skeleton-wrap { padding: 12px 16px; }
.prod-skeleton {
  height: 76px; border-radius: 14px; margin-bottom: 10px;
  background: linear-gradient(90deg,#f0e8ea 25%,#fdf5f7 50%,#f0e8ea 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>

<script>
// ── CONFIG SUPABASE ────────────────────────────────────────────



async function sbGet(path) {
  const r = await fetch(`${window.SUPABASE_URL}/rest/v1${path}`, {
    headers: {
      'apikey': window.SUPABASE_ANON,
      'Authorization': `Bearer ${window.SUPABASE_ANON}`,
    }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// Mostrar skeletons mientras carga
const skelEl = document.getElementById('skeletons');
for (let i = 0; i < 5; i++) {
  const d = document.createElement('div');
  d.className = 'prod-skeleton';
  skelEl.appendChild(d);
}

function fmt(n) { return '$' + parseInt(n).toLocaleString('es-CO'); }

function esNuevo(prod, newDays) {
  if (!prod.created_at) return false;
  return (Date.now() - new Date(prod.created_at).getTime()) < parseInt(newDays) * 86400000;
}

function badgeHtml(prod, newDays) {
  if (prod.badge === 'rec') return '<span class="badge-rec">⭐ Recomendado</span>';
  // badge 'new' puede ser manual o automático
  if (prod.badge === 'new' || (prod.badge_new_auto && esNuevo(prod, newDays))) {
    return '<span class="badge-new">Nuevo</span>';
  }
  return '';
}

async function init() {
  const params  = new URLSearchParams(location.search);
  const catId   = params.get('cat') || 'galleteria';

  try {
    // Trae categoría, productos y ajuste new_days en paralelo
    const [cats, prods, ajustes] = await Promise.all([
      sbGet(`/categorias?id=eq.${catId}&select=*`),
      sbGet(`/productos?categoria_id=eq.${catId}&visible=eq.true&order=created_at.asc&select=*`),
      sbGet(`/ajustes?clave=eq.new_days&select=valor`),
    ]);

    const cat     = cats[0];
    const newDays = ajustes[0]?.valor || '14';

    if (!cat) {
      document.getElementById('prod-list').innerHTML = emptyState('Categoría no encontrada');
      return;
    }

    document.title = `${cat.nombre} — Mundo Delis`;
    document.getElementById('top-title').textContent = cat.nombre;

    document.getElementById('cat-header-wrap').innerHTML = `
      <div class="cat-header">
        <div class="cat-header-icon"><i class="ti ${cat.icono}" aria-hidden="true"></i></div>
        <div class="cat-header-text">
          <h2>${cat.nombre}</h2>
          ${cat.descripcion ? `<p>${cat.descripcion}</p>` : ''}
        </div>
      </div>`;

    const listEl = document.getElementById('prod-list');

    if (!prods.length) {
      listEl.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-clock" aria-hidden="true"></i>
          <h3>Próximamente</h3>
          <p>Estamos preparando esta sección<br>con mucho amor 🩷</p>
        </div>`;
      return;
    }

    listEl.innerHTML = prods.map(p => {
      const badge = badgeHtml(p, newDays);
      return `
        <a class="prod-item" href="detalle.html?id=${p.id}">
          <div class="prod-thumb">
            <img src="${p.imagen_url}" alt="${p.nombre}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <i class="ti ${cat.icono}" aria-hidden="true" style="display:none"></i>
          </div>
          <div class="prod-info">
            <div class="prod-name">${p.nombre}${badge}</div>
            <div class="prod-desc">${p.desc_corta}</div>
          </div>
          <span class="prod-price">${fmt(p.precio)}</span>
        </a>`;
    }).join('');

  } catch (e) {
    document.getElementById('prod-list').innerHTML = `
      <div class="empty-state">
        <i class="ti ti-wifi-off"></i>
        <h3>Sin conexión</h3>
        <p>No se pudieron cargar los productos.<br>
           <button onclick="location.reload()"
             style="margin-top:10px;padding:8px 18px;border-radius:10px;border:none;
                    background:#A87C3A;color:#fff;font-size:13px;cursor:pointer">
             Reintentar
           </button>
        </p>
      </div>`;
    console.error(e);
  }
}

function emptyState(msg) {
  return `<div class="empty-state"><i class="ti ti-alert-circle"></i><h3>${msg}</h3></div>`;
}

init();
</script>
</body>
</html>
