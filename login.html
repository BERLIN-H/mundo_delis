<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3A2530">
<title>Acceso Admin · Mundo Delis</title>
<link rel="icon" href="img/logo.avif" type="image/avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<!-- Keys públicas centralizadas — un solo lugar para cambiarlas -->
<script src="config.js"></script>
<!-- Supabase Auth JS (UMD — sin build step) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:       #E8B4C0;
  --pink-light: #FBF0F4;
  --pink-dark:  #B5607A;
  --cream:      #FAF6F0;
  --cream-b:    #EDE5DA;
  --gold:       #A87C3A;
  --gold-mid:   #C8A050;
  --text:       #3A2530;
  --text-mid:   #6B4A55;
  --text-soft:  #9B7A85;
  --white:      #FFFFFF;
  --danger:     #D94040;
}
html, body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: #2A1820;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: 24px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
}

/* ── LOGO ── */
.logo-wrap {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--pink-light);
  border: 2px solid var(--pink);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  overflow: hidden;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.logo-wrap i { font-size: 32px; color: var(--pink-dark); }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; text-align: center; color: var(--text);
}
.sub {
  font-size: 13px; color: var(--text-soft);
  text-align: center; margin: 4px 0 28px;
}

/* ── TABS ── */
.tabs {
  display: flex; border-radius: 12px;
  background: var(--cream); padding: 4px; gap: 4px; margin-bottom: 22px;
}
.tab {
  flex: 1; padding: 9px; border: none; border-radius: 9px;
  font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
  color: var(--text-soft); cursor: pointer; transition: all .15s; background: none;
}
.tab.active { background: var(--white); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

/* ── FORM ── */
.field { margin-bottom: 14px; }
label { font-size: 12px; color: var(--text-soft); font-weight: 500; display: block; margin-bottom: 5px; }
input[type=email], input[type=password], input[type=text] {
  width: 100%; border: 1.5px solid var(--cream-b); border-radius: 10px;
  padding: 12px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
  color: var(--text); background: var(--cream); outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--gold-mid); }

/* ── BOTONES ── */
.btn-primary {
  width: 100%; background: var(--gold); color: var(--white);
  border: none; border-radius: 12px; padding: 14px;
  font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: opacity .15s; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:active { opacity: .85; }
.btn-primary:disabled { opacity: .55; cursor: not-allowed; }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 18px 0; color: var(--text-soft); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--cream-b);
}

.btn-google {
  width: 100%; background: var(--white); color: var(--text);
  border: 1.5px solid var(--cream-b); border-radius: 12px; padding: 13px;
  font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: border-color .15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-google:hover { border-color: var(--gold-mid); }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ── ESTADO ── */
.msg {
  font-size: 13px; text-align: center; margin-top: 14px;
  padding: 10px 14px; border-radius: 10px; display: none;
}
.msg.error   { background: #FEF2F2; color: var(--danger); display: block; }
.msg.success { background: #F0FAF1; color: #2D7A3A;      display: block; }
.msg.loading { background: var(--cream); color: var(--text-soft); display: block; }

.return-link {
  display: block; text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--text-soft); text-decoration: none;
}
.return-link:hover { color: var(--gold); }

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: var(--white);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="img/logo.avif" alt="Logo"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <i class="ti ti-rosette"></i>
  </div>
  <h1>Panel de Administración</h1>
  <p class="sub">Mundo Delis Repostería</p>

  <!-- Tabs: Ingresar / Crear cuenta -->
  <div class="tabs">
    <button class="tab active" id="tab-login"   onclick="showTab('login')">Ingresar</button>
    <button class="tab"        id="tab-register" onclick="showTab('register')">Registrarme</button>
  </div>

  <!-- FORM LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" placeholder="admin@mundodelis.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">
      <i class="ti ti-login"></i> Ingresar
    </button>

    <div class="divider">o continúa con</div>

    <button class="btn-google" onclick="doGoogle()">
      <!-- Google "G" SVG oficial -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>
  </div>

  <!-- FORM REGISTRO (para crear el primer admin) -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="reg-name" placeholder="Tu nombre">
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="reg-email" placeholder="admin@mundodelis.com">
    </div>
    <div class="field">
      <label>Contraseña (mínimo 8 caracteres)</label>
      <input type="password" id="reg-pwd" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Código de activación</label>
      <input type="text" id="reg-code" placeholder="Código secreto del dueño">
      <small style="font-size:11px;color:var(--text-soft);margin-top:4px;display:block">
        Solo el dueño del negocio tiene este código
      </small>
    </div>
    <button class="btn-primary" id="btn-register" onclick="doRegister()">
      <i class="ti ti-user-plus"></i> Crear cuenta admin
    </button>
  </div>

  <div class="msg" id="msg"></div>
  <a href="index.html" class="return-link">← Volver al menú público</a>
</div>

<script>
// ── SUPABASE CONFIG (viene de config.js, un solo lugar) ───────
const SUPABASE_URL  = window.SUPABASE_URL;
const SUPABASE_ANON = window.SUPABASE_ANON;

// Código secreto para crear cuentas admin (cámbialo por uno tuyo)
// Este código solo lo conoce el dueño del negocio
const ADMIN_ACTIVATION_CODE = 'DELIS2026ADMIN';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Si ya hay sesión activa, ir directo al admin ──────────────
(async () => {
  // getUser() consulta el servidor — trae el rol más actualizado
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    const rol = user.app_metadata?.rol || user.user_metadata?.rol;
    if (rol === 'ADMIN') {
      window.location.href = '/admin.html';
    }
  }
})();

// ── TABS ──────────────────────────────────────────────────────
function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('form-login').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  hideMsg();
}

// ── LOGIN CON EMAIL ───────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  if (!email || !pwd) { showMsg('Completa todos los campos', 'error'); return; }

  setLoading('btn-login', true);
  showMsg('Verificando credenciales…', 'loading');

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });

  if (error) {
    showMsg('Correo o contraseña incorrectos', 'error');
    setLoading('btn-login', false);
    return;
  }

  // Verificar rol ADMIN — app_metadata (servidor) tiene prioridad sobre user_metadata
  const rol = data.user.app_metadata?.rol || data.user.user_metadata?.rol;
  if (rol !== 'ADMIN') {
    await sb.auth.signOut();
    showMsg('Esta cuenta no tiene acceso al panel de administración', 'error');
    setLoading('btn-login', false);
    return;
  }

  showMsg('¡Bienvenida! Redirigiendo…', 'success');
  setTimeout(() => { window.location.href = '/admin.html'; }, 800);
}

// ── LOGIN CON GOOGLE ──────────────────────────────────────────
async function doGoogle() {
  showMsg('Redirigiendo a Google…', 'loading');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.SITE_URL + '/admin.html',
      queryParams: {
        // Solo permite cuentas de Gmail (puedes cambiar o quitar esto)
        // access_type: 'offline',
        // prompt: 'consent',
      }
    }
  });
  if (error) showMsg('Error al conectar con Google: ' + error.message, 'error');
}

// ── REGISTRO (primer admin) ───────────────────────────────────
async function doRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd   = document.getElementById('reg-pwd').value;
  const code  = document.getElementById('reg-code').value.trim();

  if (!name || !email || !pwd || !code) { showMsg('Completa todos los campos', 'error'); return; }
  if (pwd.length < 8) { showMsg('La contraseña debe tener mínimo 8 caracteres', 'error'); return; }
  if (code !== ADMIN_ACTIVATION_CODE) { showMsg('Código de activación incorrecto', 'error'); return; }

  setLoading('btn-register', true);
  showMsg('Creando cuenta…', 'loading');

  const { data, error } = await sb.auth.signUp({
    email,
    password: pwd,
    options: {
      data: {
        nombre: name,
        rol:    'ADMIN',      // ← rol que verifica la Netlify Function
      }
    }
  });

  if (error) {
    showMsg('Error: ' + error.message, 'error');
    setLoading('btn-register', false);
    return;
  }

  // Supabase envía un email de confirmación (si está habilitado)
  if (data.user && !data.session) {
    showMsg('✅ Cuenta creada. Revisa tu correo para confirmar y luego inicia sesión.', 'success');
  } else if (data.session) {
    showMsg('¡Cuenta creada! Redirigiendo…', 'success');
    setTimeout(() => { window.location.href = '/admin.html'; }, 800);
  }
  setLoading('btn-register', false);
}

// ── HELPERS UI ────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    const isLogin = btnId === 'btn-login';
    btn.innerHTML = isLogin
      ? '<i class="ti ti-login"></i> Ingresar'
      : '<i class="ti ti-user-plus"></i> Crear cuenta admin';
  }
}

// Enter para login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const activeForm = document.getElementById('form-login').style.display !== 'none'
      ? 'login' : 'register';
    if (activeForm === 'login')    doLogin();
    else                           doRegister();
  }
});
</script>
</body>
</html>
