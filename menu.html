<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú — Mundo Delis</title>
<link rel="icon" href="img/logo.avif" type="image/avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">

  <div class="top-bar">
    <a href="index.html" class="back-btn" aria-label="Volver"><i class="ti ti-arrow-left"></i></a>
    <span class="top-title">Menú</span>
    <div class="top-logo"><img src="img/logo.avif" alt="Logo" class="top-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><i class="ti ti-rosette" style="display:none"></i></div>
  </div>

  <div class="cat-grid">

    <a href="productos.html?cat=galleteria" class="cat-card">
      <div class="cat-icon"><i class="ti ti-cookie" aria-hidden="true"></i></div>
      <span class="cat-name">Galletería</span>
      <span class="cat-count">6 productos</span>
    </a>

    <a href="productos.html?cat=postres" class="cat-card">
      <div class="cat-icon"><i class="ti ti-ice-cream" aria-hidden="true"></i></div>
      <span class="cat-name">Postres</span>
      <span class="cat-count">17 productos</span>
    </a>

    <a href="productos.html?cat=panaderia" class="cat-card">
      <div class="cat-icon"><i class="ti ti-bread" aria-hidden="true"></i></div>
      <span class="cat-name">Panadería</span>
      <span class="cat-count">Próximamente</span>
    </a>

    <a href="productos.html?cat=bebidas" class="cat-card">
      <div class="cat-icon"><i class="ti ti-glass" aria-hidden="true"></i></div>
      <span class="cat-name">Bebidas y malteadas</span>
      <span class="cat-count">Próximamente</span>
    </a>

    <a href="productos.html?cat=waffles" class="cat-card">
      <div class="cat-icon"><i class="ti ti-waffle" aria-hidden="true"></i></div>
      <span class="cat-name">Waffles</span>
      <span class="cat-count">Próximamente</span>
    </a>

    <a href="productos.html?cat=vinos" class="cat-card">
      <div class="cat-icon"><i class="ti ti-bottle" aria-hidden="true"></i></div>
      <span class="cat-name">Vinos & Cafés</span>
      <span class="cat-count">Próximamente</span>
    </a>

    <a href="productos.html?cat=saludable" class="cat-card">
      <div class="cat-icon"><i class="ti ti-leaf" aria-hidden="true"></i></div>
      <span class="cat-name">Línea saludable</span>
      <span class="cat-count">Próximamente</span>
    </a>

    <a href="productos.html?cat=empaques" class="cat-card">
      <div class="cat-icon"><i class="ti ti-gift" aria-hidden="true"></i></div>
      <span class="cat-name">Empaques y tarjetas</span>
      <span class="cat-count">Próximamente</span>
    </a>

  </div>

  <div class="pb"></div>
</div>

</body>
</html>
