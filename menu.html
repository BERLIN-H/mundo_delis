<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú — Mundo Delis</title>
<link rel="icon" href="img/logo.avif" type="image/avif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
<script src="config.js"></script>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <a href="index.html" class="back-btn" aria-label="Volver"><i class="ti ti-arrow-left"></i></a>
    <span class="top-title">Menú</span>
    <div class="top-logo">
      <img src="img/logo.avif" alt="Logo" class="top-logo-img"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <i class="ti ti-rosette" style="display:none"></i>
    </div>
  </div>

  <!-- Grid de categorías: se rellena dinámicamente -->
  <div class="cat-grid" id="cat-grid">
    <!-- Skeletons mientras carga -->
    <div class="cat-card skeleton"></div>
    <div class="cat-card skeleton"></div>
    <div class="cat-card skeleton"></div>
    <div class="cat-card skeleton"></div>
  </div>

  <div class="pb"></div>
</div>

<style>
.cat-card.skeleton {
  background: linear-gradient(90deg, #f0e8ea 25%, #fdf5f7 50%, #f0e8ea 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  min-height: 96px;
  border-radius: 16px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>

<script>
// ── CONFIG SUPABASE ────────────────────────────────────────────



async function sbGet(path) {
  const r = await fetch(`${window.SUPABASE_URL}/rest/v1${path}`, {
    headers: {
      'apikey': window.SUPABASE_ANON,
      'Authorization': `Bearer ${window.SUPABASE_ANON}`,
    }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function init() {
  try {
    // Trae categorías y conteos en paralelo
    const [cats, conteoRows] = await Promise.all([
      sbGet('/categorias?select=*&order=orden.asc'),
      sbGet('/productos?select=categoria_id&visible=eq.true'),
    ]);

    // Conteo por categoría
    const conteos = conteoRows.reduce((acc, p) => {
      acc[p.categoria_id] = (acc[p.categoria_id] || 0) + 1;
      return acc;
    }, {});

    const grid = document.getElementById('cat-grid');
    grid.innerHTML = cats.map(cat => {
      const n = conteos[cat.id] || 0;
      const countLabel = n > 0 ? `${n} producto${n !== 1 ? 's' : ''}` : 'Próximamente';
      return `
        <a href="productos.html?cat=${cat.id}" class="cat-card">
          <div class="cat-icon"><i class="ti ${cat.icono}" aria-hidden="true"></i></div>
          <span class="cat-name">${cat.nombre}</span>
          <span class="cat-count">${countLabel}</span>
        </a>`;
    }).join('');

  } catch (e) {
    document.getElementById('cat-grid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:32px;color:#9B7A85">
        <i class="ti ti-wifi-off" style="font-size:32px;display:block;margin-bottom:8px"></i>
        No se pudo cargar el menú. Intenta de nuevo.
        <br><button onclick="location.reload()"
          style="margin-top:12px;padding:8px 20px;border-radius:10px;border:none;
                 background:#A87C3A;color:#fff;font-size:14px;cursor:pointer">
          Reintentar
        </button>
      </div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
