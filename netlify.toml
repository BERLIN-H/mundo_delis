[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "config.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/pages/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# API Function
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/admin-api"
  status = 200

# Rutas amigables → páginas reales
[[redirects]]
  from = "/menu"
  to   = "/pages/menu.html"
  status = 200

[[redirects]]
  from = "/productos"
  to   = "/pages/productos.html"
  status = 200

[[redirects]]
  from = "/detalle"
  to   = "/pages/detalle.html"
  status = 200

[[redirects]]
  from = "/domicilios"
  to   = "/pages/domicilios.html"
  status = 200

[[redirects]]
  from = "/ubicacion"
  to   = "/pages/ubicacion.html"
  status = 200

[[redirects]]
  from = "/login"
  to   = "/pages/login.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/pages/admin.html"
  status = 200
