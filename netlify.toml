# ══════════════════════════════════════════════════════════════
#  MUNDO DELIS · netlify.toml
# ══════════════════════════════════════════════════════════════

[build]
  publish = "."                        # raíz del proyecto
  functions = "netlify/functions"      # carpeta de funciones serverless

# ── HEADERS DE SEGURIDAD ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Nunca cachear el admin — siempre fresco
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# ── REDIRECTS ─────────────────────────────────────────────────
# /admin → protegido por la función
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# /api/* → Netlify Function proxy (aquí vive la service key)
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/admin-api/:splat"
  status = 200
